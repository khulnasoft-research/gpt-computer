# GitHub Issue Labeler Configuration
# Automatically labels issues based on file paths and content patterns
# Python/AI-focused configuration for gpt-computer repository

# ============================================================================
# FILE-BASED LABELS: Applied when specific file paths are changed
# ============================================================================
files:
  # Core Python Package
  'gpt_computer/**':
    - python

  # Core functionality
  'gpt_computer/core/**':
    - core
    - backend
    - python

  # API related
  'gpt_computer/api/**':
    - api
    - backend
    - python

  # Agent functionality & AI
  'gpt_computer/agent/**':
    - agent
    - ai
    - python

  # LLM Integrations
  'gpt_computer/llm/**':
    - ai
    - llm-integration
    - python

  # CLI application
  'gpt_computer/applications/cli/**':
    - cli
    - application
    - python

  # Async/Threading
  'gpt_computer/async/**':
    - async
    - python
  'gpt_computer/**/async*':
    - async
    - python

  # Benchmarking
  'benchmark/**':
    - benchmark
    - testing
    - python

  # Tests
  'tests/**':
    - testing
    - python
  'test_*.py':
    - testing
    - python
  '*_test.py':
    - testing
    - python

  # Documentation
  'docs/**':
    - documentation
  'README.md':
    - documentation
  'CHANGELOG.md':
    - documentation
  '**.md':
    - documentation
  '**.rst':
    - documentation

  # Configuration files
  'pyproject.toml':
    - dependencies
    - configuration
    - python
  'poetry.lock':
    - dependencies
    - python
  'uv.lock':
    - dependencies
    - python
  'requirements.txt':
    - dependencies
    - python
  'setup.py':
    - dependencies
    - python
  'setup.cfg':
    - dependencies
    - python
  'Makefile':
    - build
    - configuration
  'tox.ini':
    - testing
    - ci/cd
    - python

  # Docker & Deployment
  'docker-compose.yml':
    - docker
    - deployment
  'docker/**':
    - docker
    - deployment
  'Dockerfile':
    - docker
    - deployment

  # CI/CD & Automation
  '.github/workflows/**':
    - ci/cd
    - automation
  '.github/ISSUE_TEMPLATE/**':
    - configuration
  '.github/PULL_REQUEST_TEMPLATE/**':
    - configuration
  '.github/dependabot.yml':
    - ci/cd
    - dependencies
    - automation

  # Pre-commit & Linting
  '.pre-commit-config.yaml':
    - code-quality
    - python
  '.flake8':
    - code-quality
    - python
  'ruff.toml':
    - code-quality
    - python
  'pyproject.toml':
    - code-quality
    - python

  # Scripts
  'scripts/**':
    - scripts
    - automation
    - python

  # Projects and examples
  'projects/**':
    - examples
    - projects
  'examples/**':
    - examples
    - projects

  # Environment & Configuration
  '.env.template':
    - configuration
  '.gitignore':
    - configuration
  '.gitattributes':
    - configuration

